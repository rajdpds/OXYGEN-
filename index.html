<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NITROGEN GYM</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Oswald',sans-serif;
    background:#000;
    color:#ff0000;
}

/* KEEPING YOUR EXISTING STYLE SAME */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo{
    font-size:36px;
    font-weight:700;
}

.join-btn{
    background:transparent;
    border:2px solid #ff0000;
    color:#ff0000;
    padding:10px 25px;
    border-radius:30px;
    cursor:pointer;
}

.hero{
    width:100%;
    max-height:500px;
    overflow:hidden;
}

.hero img{
    width:100%;
    height:500px;
    object-fit:cover;
}

.equipment-section{
    width:95%;
    max-width:1400px;
    margin:60px auto;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:40px;
}

.equipment-card{
    background:#111;
    border:1px solid #ff0000;
    border-radius:25px;
    padding:25px;
    text-align:center;
    cursor:pointer;
}

.equipment-card img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:15px;
}

.equipment-card p{
    margin-top:15px;
    font-size:22px; /* bigger text */
    font-weight:600;
}

/* BMI SECTION */
.bmi-section{
    width:90%;
    max-width:600px;
    margin:80px auto;
    background:#111;
    border:1px solid #ff0000;
    border-radius:25px;
    padding:40px;
    text-align:center;
}

.bmi-section input{
    width:80%;
    padding:10px;
    margin:10px 0;
    background:#000;
    border:1px solid #ff0000;
    color:#ff0000;
}

.bmi-section button{
    padding:10px 20px;
    background:#ff0000;
    color:#000;
    border:none;
    cursor:pointer;
}

/* WHATSAPP FLOAT */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    background:#25D366;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    color:#fff;
    text-decoration:none;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    overflow:auto;
}

.modal-content{
    background:#111;
    padding:30px;
    border-radius:20px;
    border:1px solid #ff0000;
    width:95%;
    max-width:600px;
}

.exercise-img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:15px;
    margin:10px 0;
}

.exercise-text{
    font-size:20px;
    line-height:1.6;
}

.modal form input{
    width:90%;
    padding:8px;
    margin:8px 0;
    background:#000;
    border:1px solid #ff0000;
    color:#ff0000;
}

.modal form button{
    padding:8px 15px;
    background:#ff0000;
    color:#000;
    border:none;
    cursor:pointer;
}

.close{
    float:right;
    cursor:pointer;
}

@media(max-width:1000px){
    .equipment-section{
        grid-template-columns:repeat(2,1fr);
    }
}
</style>
</head>
<body>

<header>
<div class="logo">NITROGEN GYM</div>
<button class="join-btn">JOIN</button>
</header>

<div class="hero">
<img src="header.jpg">
</div>

<div class="equipment-section">
<div class="equipment-card" onclick="openModal('Dumbbells')">
<img src="dumbbell.jpg">
<p>Dumbbells</p>
</div>

<div class="equipment-card" onclick="openModal('Treadmill')">
<img src="treadmill.jpg">
<p>Treadmill</p>
</div>

<!-- keep your other equipment same -->
</div>

<!-- BMI -->
<div class="bmi-section">
<h2>BMI Calculator</h2>
<input type="number" id="height" placeholder="Height (cm)">
<input type="number" id="weight" placeholder="Weight (kg)">
<br>
<button onclick="calculateBMI()">Calculate</button>
<p id="bmiResult"></p>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">X</span>
<h2 id="modalTitle"></h2>
<div id="exerciseContent"></div>

<form>
<h3>Interested?</h3>
<input type="text" placeholder="Your Name">
<input type="tel" placeholder="Phone Number">
<button type="submit">Submit</button>
</form>

</div>
</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/918638136604" target="_blank">💬</a>

<script>

const exerciseData = {
"Dumbbells": `
<img src="curl.jpg" class="exercise-img">
<div class="exercise-text">• Bicep Curl<br>• Shoulder Press<br>• Dumbbell Fly</div>
`,
"Treadmill": `
<img src="run.jpg" class="exercise-img">
<div class="exercise-text">• Sprint Intervals<br>• Incline Walk<br>• Fat Burn Run</div>
`
};

function openModal(machine){
document.getElementById("modal").style.display="flex";
document.getElementById("modalTitle").innerText=machine;
document.getElementById("exerciseContent").innerHTML=exerciseData[machine];
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function calculateBMI(){
let h=document.getElementById("height").value/100;
let w=document.getElementById("weight").value;
let bmi=(w/(h*h)).toFixed(1);
document.getElementById("bmiResult").innerText="Your BMI: "+bmi;
}

</script>

</body>
</html>
